# Pages CMS configuration — what admins can edit at app.pagescms.org.
# IMPORTANT: the `path` values here must match the Astro content-collection
# globs we define in src/content.config.ts (Step 5), and `media` must live
# under public/ so the files are served at a real URL.

media:
  input: public/uploads      # uploaded files are committed here…
  output: /uploads           # …and referenced in content by this URL

content:
  - name: posts
    label: Articles
    type: collection
    path: src/content/blog
    filename: "{year}-{month}-{day}-{primary}.md"
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date, required: true, options: { format: yyyy-MM-dd } }
      - { name: summary, label: Summary, type: text }
      - { name: image, label: Hero image, type: image }
      - { name: body, label: Body, type: rich-text }

  - name: events
    label: Events & Schedule
    type: collection
    path: src/content/events
    filename: "{primary}.md"
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: starts, label: Date, type: date, options: { format: yyyy-MM-dd } }
      - { name: recurring, label: Recurring weekly?, type: boolean, default: false }
      - name: weekday
        label: Weekday
        type: select
        options:
          values: [Sunday, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday]
      - { name: time, label: Time, type: string }
      - { name: body, label: Details, type: rich-text }

  - name: team
    label: Leadership Profiles
    type: collection
    path: src/content/team
    filename: "{primary}.md"
    fields:
      - { name: name, label: Full name, type: string, required: true }
      - { name: role, label: Role, type: string }
      - { name: order, label: Sort order, type: number, default: 99 }
      - { name: photo, label: Photo, type: image }
      - { name: body, label: Biography, type: rich-text }

  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - { name: title, label: Site title, type: string }
      - { name: description, label: Description, type: text }
      - { name: url, label: URL, type: string }
